experiment:
  name: "financial_math_call1_v1"
  version: 1
  seed: 42

input:
  root_directory: "data/ground_truth"
  ground_truth_answer_keys:
    - "solution"
    - "ground_truth"
    - "answer"
    - "expected_answer"
    - "atoms"

  filters:
    languages:
      - "en"

    variations:
      - "baseline"

    prompt_types:
      - "strictly_sequential"
      - "prompt_accumulation"
      - "ground_truth_forcing"
      - "self_history"

output_modes:
  - "plain_text"
  # Add "native_yaml" when you want Call 1 to save structured YAML.
  # - "native_yaml"

prompts:
  common_header: |
    You are solving a financial mathematics exercise.
    Write a concise rigorous mathematical answer. Do not include hidden reasoning or long explanations. Use LaTeX for formulas.

    Context:
    $context

    Global assumptions:
    $global_assumptions

  strategies:
    strictly_sequential: |
      Local assumptions:
      $current_assumptions

      Question $current_question_number:
      $current_question

      Answer only Question $current_question_number.

    prompt_accumulation: |
      Questions provided so far:
      $accumulated_questions

      Answer only Question $current_question_number.

    ground_truth_forcing: |
      Previous questions and exact solutions:
      $ground_truth_history

      Local assumptions:
      $current_assumptions

      Current question $current_question_number:
      $current_question

      Answer only Question $current_question_number.

    self_history: |
      Previous questions and your previous answers:
      $self_history

      Local assumptions:
      $current_assumptions

      Current question $current_question_number:
      $current_question

      Answer only Question $current_question_number.

output:
  root_directory: "outputs/call1"
  directory_template: "{mode}/{model}/{language}/{variation}"
  filename_template: "pc{pc}_q{exercise}_{prompt_type_abbrev}{suffix}"
  error_report_filename: "error_files.yaml"
  overwrite_existing: false

ollama:
  endpoint: "http://localhost:11434/api/generate"
  timeout_seconds: 600

models:
  # Small models
  - id: "tinyllama"
    provider: "ollama"
    enabled: true
    parameters:
      max_output_tokens: 3000

  - id: "llama3.2:1b"
    provider: "ollama"
    enabled: true
    parameters:
      max_output_tokens: 3000

  - id: "deepseek-r1:1.5b"
    provider: "ollama"
    enabled: true
    parameters:
        max_output_tokens: 6000

  - id: "qwen2.5-coder:0.5b"
    provider: "ollama"
    enabled: true
    parameters:
      max_output_tokens: 3000

  - id: "qwen3:0.6b"
    provider: "ollama"
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 6000

  # Medium models
  - id: "llama3.1:8b"
    provider: "ollama"
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 3000

  - id: "deepseek-r1:7b"
    provider: "ollama"
    enabled: true
    parameters:
      temperature: 0.1
      max_output_tokens: 3000

execution:
  max_retries: 5
  retry_delay_seconds: 5
