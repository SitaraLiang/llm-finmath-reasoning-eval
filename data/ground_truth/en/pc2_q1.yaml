-   question: 'Show that a process $(X_t)_{t\in \R^+}$ is a Brownian motion if and
        only if: $X_0=0$, $(X_t)_{t\in \R^+}$ is a centered Gaussian process, ${\rm
        Cov}(X_s,X_t)=\inf(s,t).$'
    assumptions: []
    atoms: !!python/tuple
    -   -   preconditions:
            - For \(s \leq t\), we decompose \(X_t = X_s + (X_t - X_s)\).
            arguments:
            - Independence of \(X_s\) and \(X_t - X_s\)
            outcomes:
            - \(\mathrm{Cov}(X_s, X_t) = \min(s,t)\)
        -   preconditions:
            - Standard Brownian motion has Gaussian increments
            - \(X_0 = 0\),
            arguments:
            - a linear combination of independent Gaussian increments thus it is Gaussian
            outcomes:
            - The process is therefore centered Gaussian
    -   -   preconditions:
            - Using property ($iii'$)
            - Compute $\text{Cov}(X_t - X_s, X_v - X_u)$ for \(s < t \leq u < v\).
            arguments:
            - Calculation
            outcomes:
            - disjoint increments are uncorrelated, hence independent
        -   preconditions:
            - Compute the variance of an increment of $X$
            arguments:
            - thus the law depends only on \(t-s\)
            outcomes:
            - This shows that the increments are stationary
            - and have law \(\mathcal{N}(0, t-s)\).
        - !!python/tuple
            -   preconditions:
                - disjoint increments are independent
                - the law of increments is Gaussian centered of variance $t-s$, i.e.
                    \(\mathcal{N}(0, t-s)\),
                arguments:
                - plus the assumption of continuity of paths
                outcomes:
                - the classical definition of Brownian motion.
            -   preconditions:
                - disjoint increments are independent
                - the law of increments is Gaussian centered of variance $t-s$, i.e.
                    \(\mathcal{N}(0, t-s)\),
                arguments:
                - by taking the continuous version via Kolmogorov's theorem
                outcomes:
                - the classical definition of Brownian motion.
-   question: Show that if $W_t$ is a Brownian motion, $ \{X_t=t\;W_{\frac 1t}, t>0,
        X_0=0 \}$ is a Brownian motion too.
    assumptions: []
    atoms: !!python/tuple
    -   preconditions:
        - compute $\lim_{t \to 0^+} t W_{1/t}$
        arguments:
        - Hence by the law of large numbers for Brownian motion
        outcomes:
        - $\lim_{t \to 0^+} t W_{1/t} = 0$ a.s.
    -   preconditions:
        - For any arbitrary \(t_1, \dots, t_n\), the vector \((X_{t_1}, \dots, X_{t_n})\)
        arguments:
        - is a linear combination of the \(W_{1/t_i}\)
        outcomes:
        - thus it is centered Gaussian. \\
    -   preconditions: []
        arguments:
        - Calculation
        outcomes:
        - i.e. $\mathbb{E}[X_t X_s] = \min(t,s)$. \\
    -   preconditions:
        - 'continuity: $\lim_{t \to 0^+} X_t = 0$ a.s.,'
        - 'Gaussianity: the vector \((X_{t_1}, \dots, X_{t_n})\) is centered Gaussian
            for any set of times'
        - 'covariance: $\mathbb{E}[X_t X_s] = \min(t,s)$,'
        - adding \(X_0 = 0\)
        arguments:
        - we get by definition of a Brownian motion
        outcomes:
        - that \(X\) is a Brownian motion.
